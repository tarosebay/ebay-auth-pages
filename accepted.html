<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Authorized</title>
</head>
<body>
  <h1>認証が完了しました</h1>
  <p>下の code をコピーしてください。</p>
  <pre id="codeBox" style="white-space: pre-wrap; word-break: break-all; border: 1px solid #ccc; padding: 12px;"></pre>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '';
    document.getElementById('codeBox').textContent = code || 'code が見つかりません';
  </script>
</body>
</html>
